<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTW — home</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0d14;
      --panel: #0e171c;
      --line: #23313a;
      --text: #f4f7f8;
      --muted: #9aa5ad;
      --accent: #f0c040;
      --danger: #ff8d8d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 34px;
    }
    .brand {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 34px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    button {
      margin-top: 24px;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #0a0a0a;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled {
      opacity: .62;
      cursor: wait;
    }
    button.secondary {
      margin-top: 10px;
      border-color: var(--line);
      background: transparent;
      color: var(--muted);
      font-weight: 550;
    }
    button.secondary:disabled {
      opacity: .62;
    }
    .status {
      min-height: 22px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .status.error { color: var(--danger); }
    .learn {
      display: inline-block;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">FTW</div>
    <h1>Reach your home</h1>
    <p id="copy">Unlock your saved home directory with your passkey. The app itself loads from your Pi.</p>
    <button id="unlock" type="button">Continue with passkey</button>
    <button id="reset-browser" class="secondary" type="button">Reset this browser</button>
    <div id="status" class="status" role="status" aria-live="polite">Checking this browser...</div>
    <a class="learn" href="https://ftw.sourceful.energy" rel="noopener">Learn more</a>
  </main>
  <script type="module" src="/remote-loader.js?v=loader5"></script>
</body>
</html>
