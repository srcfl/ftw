<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTW — sign in</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg">
  <link rel="stylesheet" href="/components/theme.css">
  <style>
    body { font-family: var(--sans), system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1rem; color: var(--fg, #222); background: var(--bg, #fff); }
    h1 { font-weight: 600; }
    .panel { border: 1px solid var(--line, #ddd); padding: 1.5rem; border-radius: .5rem; margin-top: 2rem; }
    button { font: inherit; padding: .6rem 1.2rem; border-radius: .3rem; border: 1px solid var(--line, #ddd); cursor: pointer; background: var(--ink-raised, #fafafa); color: inherit; }
    button.primary { background: var(--accent-e, #f0c040); border-color: var(--accent-e, #f0c040); color: #0a0a0a; font-weight: 600; }
	    .err { color: #c00; background: #fee; border: 1px solid #fcc; padding: .5rem; border-radius: .3rem; margin: 1rem 0; }
	    .ok { color: #060; background: #efe; border: 1px solid #cfc; padding: .5rem; border-radius: .3rem; margin: 1rem 0; }
	    .muted { color: var(--fg-muted, #888); font-size: .9em; }
	    .diag { margin-top: .75rem; color: #700; }
	    .diag summary { cursor: pointer; font-weight: 600; }
	    .diag dl { display: grid; grid-template-columns: max-content 1fr; gap: .25rem .65rem; margin: .5rem 0 0; }
	    .diag dt { font-weight: 600; }
	    .diag dd { margin: 0; overflow-wrap: anywhere; font-family: var(--mono), monospace; }
	  </style>
</head>
<body>
  <h1>Sign in</h1>
  <p class="muted">Authenticate with a previously enrolled passkey. Your browser will prompt for Touch ID, Windows Hello, or your device's equivalent.</p>

  <div class="panel">
    <input id="passkey-field" name="username" autocomplete="username webauthn"
           placeholder="Sign in with your passkey…" autofocus
           style="width:100%; font:inherit; padding:.6rem; border:1px solid var(--line,#ddd); border-radius:.3rem; margin-bottom:.8rem;" />
    <button id="signin" class="primary">Sign in with passkey</button>
    <button onclick="location.href='./'">Cancel</button>
    <div id="msg"></div>
  </div>

  <!-- Load the P2P transport so the login ceremony can run OVER the DTLS
       DataChannel (P2P-only home route). ownerFetch() below routes owner API
       calls through window.p2pFetch when a channel is up, so the owner session
       cookie is minted INSIDE DTLS and never crosses the relay. -->
  <script src="/p2p.js?v=p2p14"></script>
  <script type="module">
    import { apiBase, decodeAssertionOptions, encodeAssertionResult, bufToB64url } from "./webauthn.js";
    import { ownerFetch, isLanOrigin } from "./owner-fetch.js";
    import { extensionInput, outputFrom, deriveEncKey } from "./prf.js";
    import { loadDirectory } from "./instance-sync.js";
    import { exportPubHex } from "./device-key.js";
    const base = apiBase();
    const msg = document.getElementById("msg");

    if (!isLanOrigin()) {
      location.replace("/");
    } else {

    // ownerFetch (shared, owner-fetch.js) routes the owner login ceremony over the
    // P2P DataChannel in STRICT mode (FIX-2): the WebAuthn assertion + ceremony
    // token must NEVER leak to the untrusted relay. It fails closed on a public
	    // origin both when the channel is down (p2pFetchStrict's synthetic 503) AND
	    // when p2p.js never loaded at all (FIX-B) — only a genuine-LAN origin, where
	    // the Pi serves this page directly, raw-fetches.

	    let pendingAbort = null;

	    function esc(s) {
	      return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
	        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
	      }[c]));
	    }

	    function codeFromText(text) {
	      const m = /^([A-Z0-9_]+):/.exec(String(text || ""));
	      return m ? m[1] : "";
	    }

	    function p2pState() {
	      try {
	        if (window.ftwP2P && typeof window.ftwP2P.state === "function") return window.ftwP2P.state();
	      } catch (_) { /* diagnostics only */ }
	      return "unavailable";
	    }

	    function hintFor(code, status, body) {
	      const text = String(body || "");
	      if (code === "FTW_REMOTE_P2P_ONLY" || status === 405) {
	        return "The request reached the relay directly. Wait for the secure channel, then try again.";
	      }
	      if (status === 503 || /secure channel unavailable|p2p/i.test(text)) {
	        return "The secure channel to your Pi is not ready yet. Leave this page open for a moment and try again.";
	      }
	      if (status === 404) {
	        return "No passkey is enrolled for this home yet. Start from local Settings -> Access.";
	      }
	      return "Retry once. If it repeats, send the support code and details below.";
	    }

	    function renderFailure(stage, response, body) {
	      const code = (response.headers && response.headers.get && response.headers.get("X-FTW-Error-Code")) ||
	        codeFromText(body) ||
	        ("FTW_HTTP_" + response.status);
	      msg.innerHTML = '<div class="err">' +
	        '<strong>' + esc(stage) + ' failed (' + esc(response.status) + ')</strong><br>' +
	        '<span>' + esc(body || code) + '</span>' +
	        '<p>' + esc(hintFor(code, response.status, body)) + '</p>' +
	        '<details class="diag" open><summary>Support details</summary><dl>' +
	          '<dt>Code</dt><dd>' + esc(code) + '</dd>' +
	          '<dt>Step</dt><dd>' + esc(stage) + '</dd>' +
	          '<dt>Status</dt><dd>' + esc(response.status) + '</dd>' +
	          '<dt>Host</dt><dd>' + esc(location.host) + '</dd>' +
	          '<dt>LAN</dt><dd>' + esc(isLanOrigin() ? "yes" : "no") + '</dd>' +
	          '<dt>P2P</dt><dd>' + esc(p2pState()) + '</dd>' +
	        '</dl></details>' +
	      '</div>';
	    }

    async function runLogin(mediation) {
      msg.innerHTML = "";
      // Only ONE WebAuthn ceremony may be in flight at a time. Abort any prior
      // one — notably the conditional-UI autofill request started on load —
      // before starting another, or the browser throws
      // "OperationError: A request is already pending." The login/start fetch
      // below gives the abort an async beat to land before the next get().
      if (pendingAbort) pendingAbort.abort();
      const abort = new AbortController();
      pendingAbort = abort;
      try {
        const start = await ownerFetch("/api/owner-access/login/start", { method: "POST" });
        if (abort.signal.aborted) return; // superseded while we were fetching
        if (start.status === 404) {
          msg.innerHTML = '<div class="err">No passkeys enrolled. Enroll one on the LAN dashboard first.</div>';
          return;
        }
	        if (!start.ok) {
	          renderFailure("Start", start, await start.text());
	          return;
	        }
        const { ceremony_token, options } = await start.json();
        const credOpts = decodeAssertionOptions(options);
        // Request the PRF extension so this assertion also yields the per-wallet
        // directory ENCRYPTION key (prf.js) — the same passkey tap that signs in
        // can decrypt the owner's list of FTW homes from the relay. Harmless where
        // unsupported (no prf result → browser-carried directory only).
        credOpts.extensions = Object.assign({}, credOpts.extensions, extensionInput());
        const getOpts = { publicKey: credOpts, signal: abort.signal };
        if (mediation) getOpts.mediation = mediation;
        const cred = await navigator.credentials.get(getOpts);
        if (!cred) return; // no selection
        const finishBody = encodeAssertionResult(cred);
        try {
          const devicePubHex = await exportPubHex();
          if (devicePubHex) finishBody.device_pubkey = devicePubHex;
        } catch (_) { /* passkey login still works; this browser just won't silent-login */ }

        const finish = await ownerFetch(
          "/api/owner-access/login/finish?ceremony_token=" + encodeURIComponent(ceremony_token),
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(finishBody),
            credentials: "same-origin",
          }
	        );
	        if (!finish.ok) {
	          renderFailure("Finish", finish, await finish.text());
	          return;
	        }
        msg.innerHTML = '<div class="ok">Signed in. Redirecting…</div>';

        // Seed the browser-carried directory from THIS assertion's PRF output so
        // the dashboard (next-app.js) routes to the right home after the redirect.
        // Best-effort: a PRF/decrypt/network failure never blocks the redirect —
        // the dashboard re-derives the directory on its own sign-in path too.
        try {
          const uh = cred.response && cred.response.userHandle ? cred.response.userHandle : null;
          const W = uh ? bufToB64url(uh) : null;
          if (W) {
            const prfOut = outputFrom(cred);
            const encKey = prfOut ? await deriveEncKey(prfOut) : null;
            await loadDirectory(W, encKey, location.origin); // caches instances for routing
          }
        } catch (e) { /* non-fatal — directory self-heals on the dashboard */ }

        setTimeout(() => location.href = base + "/", 800);
	      } catch (e) {
	        if (e.name === "AbortError") return; // cancelled / superseded — silent
	        msg.innerHTML = '<div class="err"><strong>' + esc(e.name || "FTW_LOGIN_EXCEPTION") + '</strong><br>' +
	          esc(e.message || String(e)) +
	          '<details class="diag" open><summary>Support details</summary><dl>' +
	            '<dt>Code</dt><dd>' + esc(e.name || "FTW_LOGIN_EXCEPTION") + '</dd>' +
	            '<dt>Step</dt><dd>exception</dd>' +
	            '<dt>Host</dt><dd>' + esc(location.host) + '</dd>' +
	            '<dt>LAN</dt><dd>' + esc(isLanOrigin() ? "yes" : "no") + '</dd>' +
	            '<dt>P2P</dt><dd>' + esc(p2pState()) + '</dd>' +
	          '</dl></details></div>';
	      } finally {
        if (pendingAbort === abort) pendingAbort = null;
      }
    }

    document.getElementById("signin").onclick = () => runLogin(undefined);

    // Conditional UI: silently offer the passkey on the autofill field when
    // supported. Clicking the button aborts this and runs a modal ceremony.
    (async () => {
      try {
        if (await PublicKeyCredential.isConditionalMediationAvailable?.()) {
          runLogin("conditional");
        }
      } catch { /* feature-detect failure → button only */ }
    })();
    }
  </script>
</body>
</html>
