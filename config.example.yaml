# forty-two-watts config example
# Copy to config.yaml and edit for your site.

site:
  name: "Home"
  control_interval_s: 2         # 2 s matches Ferroamp ehub ~1 Hz; drop to 1 for snappier response
  grid_target_w: 0              # 0 = self-consumption
  grid_tolerance_w: 42          # deadband (The Answer)
  watchdog_timeout_s: 60
  smoothing_alpha: 0.3
  slew_rate_w: 3000             # W per cycle. Both Ferroamp and Sungrow ramp internally — this is a soft ceiling, not the primary protection
  # slew_enabled: false         # disable the external slew limiter entirely and trust the inverter's internal ramp control (experimental)
  min_dispatch_interval_s: 2    # debounce; keep == control_interval_s

fuse:
  max_amps: 16
  phases: 3
  voltage: 230

# ----------------------------------------------------------------------
# Drivers — Lua scripts with per-driver capabilities.
# Capabilities are the ONLY way the sandbox talks to the outside world.
# A driver with only mqtt capability can't touch modbus, and vice versa.
# ----------------------------------------------------------------------
drivers:
  - name: ferroamp
    lua: drivers/ferroamp.lua
    is_site_meter: true              # exactly one driver must have this
    battery_capacity_wh: 15200
    capabilities:
      mqtt:
        host: 192.168.1.153
        port: 1883
        username: extapi
        password: ferroampExtApi

  - name: sungrow
    lua: drivers/sungrow.lua
    battery_capacity_wh: 9600
    capabilities:
      modbus:
        host: 192.168.1.10
        port: 502
        unit_id: 1

  # Pixii PowerShaper. When troubleshooting mode is enabled in Settings,
  # Pixii also exposes calibration/control status and setpoint readback metrics.
  # - name: pixii
  #   lua: drivers/pixii.lua
  #   is_site_meter: true
  #   battery_capacity_wh: 20000
  #   capabilities:
  #     modbus:
  #       host: 192.168.1.50
  #       port: 502
  #       unit_id: 1

  # V2X chargers are modeled separately from stationary batteries.
  # They emit signed v2x_charger.w telemetry:
  #   +W = vehicle charging, -W = vehicle discharging into the site/grid.
  # Manual test setpoints can be sent with POST /api/v2x/command.
  #
  # - name: ferroamp_dc2
  #   lua: drivers/ferroamp_dc2_v2x.lua
  #   capabilities:
  #     mqtt:
  #       host: 192.168.1.70
  #       port: 1883
  #       username: dc2
  #       password: dc2mqtt!
  #
  # - name: ambibox
  #   lua: drivers/ambibox_v2x.lua
  #   capabilities:
  #     mqtt:
  #       host: sid-os.local
  #       port: 1883

api:
  port: 8080

# Owner remote access — reach your dashboard from anywhere over a direct,
# end-to-end-encrypted browser↔Pi WebRTC channel (the relay only brokers the
# connection; it never sees your traffic). OPT-IN, DEFAULT OFF: the Pi makes no
# outgoing connection unless you enable it. Omit this block to stay fully local.
# remote_access:
#   enabled: false
#   turn:                 # optional blind ICE fallback for hard-NAT/CGNAT peers
#     enabled: false      # relays ciphertext only — costs zero trustlessness
#     url: ""

# Home Assistant MQTT bridge (optional)
homeassistant:
  enabled: false
  broker: 192.168.1.1
  port: 1883
  username: homeems
  password: homeems
  publish_interval_s: 5

# Calendar-based planner constraints (#498). 42W reads a CalDAV calendar
# (served by the bundled, LAN-only Radicale sidecar) and turns events into
# planner intents: "Away"/"Vacation" → away load profile; "Charge car 80%"
# → EV target SoC by the event time. It also writes an EVSE usage-history
# calendar. Opt-in + fail-soft. Start the sidecar with
# `docker compose --profile calendar up -d`. password is stored in state.db.
caldav:
  enabled: false
  # server: radicale → talk to the bundled Radicale sidecar (GPLv3, separate
  # container). server: native → run an in-process pure-Go CalDAV server
  # (emersion/go-webdav, MIT) — no sidecar, works in a single container incl.
  # a Home Assistant add-on; objects persist in state.db. (native still lacks
  # server-side recurrence expansion.)
  server: radicale
  # listen: ":5232"          # bind address for the native server
  url: http://localhost:5232
  username: fortytwowatts
  # manage_credentials (default true): 42W generates the password and writes the
  # Radicale htpasswd itself, then shows it (with a QR) in Settings → Calendar.
  # Set false to manage radicale/config/users by hand and set `password` here.
  manage_credentials: true
  # htpasswd_path: /app/radicale-config/users   # where 42W writes the credential
  password: ""
  calendar_path: /fortytwowatts/energy/
  poll_interval_s: 300
  ev_default_target_soc_pct: 80
  # ev_loadpoint_id: ""            # defaults to the first configured loadpoint
  # away_keywords: [away, vacation, holiday]
  # ev_keywords:   [ev, car, charge]
  evse_history: true               # write a calendar event per EV charge session
  history_path: /fortytwowatts/history/
  publish_plan: true               # publish upcoming charge/discharge windows (read-only)
  plan_path: /fortytwowatts/plan/
  # plan_publish_interval_s: 900   # how often the plan calendar is reconciled

# Persistent state (SQLite)
state:
  path: state.db
