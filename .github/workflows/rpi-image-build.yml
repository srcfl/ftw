name: rpi installer image

# The SD-card image is an installer, not an application release artefact.
# First boot pulls the current stable FTW containers from GHCR, so rebuilding
# the full Raspberry Pi OS image for every FTW tag only adds an hour of latency
# without changing what application version a fresh installation receives.
#
# Full builds therefore happen only when installer inputs land on master, on a
# monthly refresh cadence (fresh OS/Docker packages), or by explicit dispatch.
# Pull requests get fast structural validation; a maintainer can dispatch a
# non-publishing build when a flashable hardware-test candidate is needed.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Defaults to the ref selected in the workflow UI.
        required: false
        default: ''
        type: string
      publish:
        description: Publish to the permanent rpi-installer prerelease channel
        required: false
        default: false
        type: boolean
  pull_request:
    branches: [master]
    paths:
      - 'deploy/pi-gen/**'
      - 'deploy/imager/os_list.json'
      - '.github/workflows/rpi-image-build.yml'
      - 'docker-compose.yml'
      - 'mosquitto/config/**'
  push:
    branches: [master]
    paths:
      - 'deploy/pi-gen/**'
      - 'deploy/imager/os_list.json'
      - '.github/workflows/rpi-image-build.yml'
      - 'docker-compose.yml'
      - 'mosquitto/config/**'
  schedule:
    # Monthly is frequent enough for fresh-install OS/Docker currency without
    # tying a 60+ minute pi-gen build to FTW's much faster release cadence.
    - cron: '17 3 1 * *'

permissions:
  contents: read

concurrency:
  group: rpi-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate installer scaffolding
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate shell syntax
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "bash -n ${file}"
            bash -n "${file}"
          done < <(find deploy/pi-gen -type f \
            \( -name '*.sh' -o -name 'ftw-wifi-onboarding' \) -print0)

      - name: Validate Imager metadata template
        run: |
          set -euo pipefail
          jq -e '
            .os_list | length == 1
            and .[0].name == "FTW"
            and .[0].icon == "https://raw.githubusercontent.com/srcfl/ftw/master/web/logo.png"
            and .[0].init_format == "cloudinit-rpi"
            and (.[0].url | contains("__IMAGE_URL__"))
            and (.[0].extract_sha256 | contains("__EXTRACT_SHA256__"))
          ' deploy/imager/os_list.json >/dev/null

      - name: Validate embedded Compose file
        run: docker compose -f docker-compose.yml config --quiet

  build:
    name: build RPi installer image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Free disk space
        # pi-gen needs more scratch space than the standard runner exposes.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "${AGENT_TOOLSDIRECTORY}"
          sudo docker system prune -af
          df -h /

      - name: Install qemu for arm64 cross-build
        # Keep the known-good static interpreter setup until the native ARM
        # runner path has been benchmarked with this pinned pi-gen revision.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends qemu-user-static
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          sudo docker run --privileged --rm tonistiigi/binfmt --install arm64
          which qemu-aarch64

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve source revision
        id: source
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Build image
        run: deploy/pi-gen/build.sh

      - name: Locate and name installer artefact
        id: artifact
        run: |
          set -euo pipefail
          shopt -s nullglob
          candidates=( deploy/pi-gen/pi-gen/deploy/*ftw-rpi4-arm64.img.xz )
          src=""
          for candidate in "${candidates[@]}"; do
            case "${candidate}" in
              *-lite.img.xz) continue ;;
            esac
            src="${candidate}"
            break
          done
          if [ -z "${src}" ]; then
            echo "pi-gen produced no FTW rpi4 image" >&2
            ls -lah deploy/pi-gen/pi-gen/deploy/ || true
            exit 1
          fi

          build_date="$(date -u +%Y%m%d)"
          short_sha="${{ steps.source.outputs.short_sha }}"
          name="ftw-rpi4-arm64-${build_date}-${short_sha}.img.xz"
          dst="deploy/pi-gen/pi-gen/deploy/${name}"
          mv "${src}" "${dst}"
          (
            cd "$(dirname "${dst}")"
            sha256sum "${name}" > "${name}.sha256"
          )
          ls -lah "${dst}" "${dst}.sha256"
          echo "path=${dst}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Render Raspberry Pi Imager repository metadata
        env:
          ASSET: ${{ steps.artifact.outputs.path }}
          ASSET_NAME: ${{ steps.artifact.outputs.name }}
          INSTALLER_TAG: rpi-installer
        run: |
          set -euo pipefail
          image_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${INSTALLER_TAG}/${ASSET_NAME}"
          download_size="$(stat -c%s "${ASSET}")"
          extract_size="$(xz --robot --list "${ASSET}" | awk '/^totals/{print $5}')"
          extract_sha="$(xz -dc "${ASSET}" | sha256sum | cut -d' ' -f1)"
          release_date="$(date -u +%Y-%m-%d)"

          jq \
            --arg url "${image_url}" \
            --argjson ds "${download_size}" \
            --argjson es "${extract_size}" \
            --arg sha "${extract_sha}" \
            --arg date "${release_date}" \
            '.os_list[0].url = $url
            | .os_list[0].image_download_size = $ds
            | .os_list[0].extract_size = $es
            | .os_list[0].extract_sha256 = $sha
            | .os_list[0].release_date = $date' \
            deploy/imager/os_list.json > os_list.json

          jq -e '.os_list[0].extract_sha256 | test("^[0-9a-f]{64}$")' os_list.json >/dev/null
          if grep -q '__IMAGE_URL__\|__EXTRACT_SHA256__' os_list.json; then
            echo "os_list.json still contains template placeholders" >&2
            exit 1
          fi

      - name: Upload non-publishing hardware-test candidate
        if: github.event_name == 'workflow_dispatch' && !inputs.publish
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.path }}.sha256
            os_list.json
          retention-days: 14
          if-no-files-found: error

      - name: Publish permanent installer channel
        if: github.event_name != 'workflow_dispatch' || inputs.publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALLER_TAG: rpi-installer
          ASSET: ${{ steps.artifact.outputs.path }}
          ASSET_NAME: ${{ steps.artifact.outputs.name }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          notes="Latest FTW Raspberry Pi installer image. Built from ${SOURCE_SHA} on $(date -u +%Y-%m-%d). Fresh installations pull the current stable FTW containers from GHCR on first boot."

          if gh release view "${INSTALLER_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${INSTALLER_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "FTW Raspberry Pi installer" \
              --prerelease \
              --notes "${notes}"
          else
            gh release create "${INSTALLER_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${SOURCE_SHA}" \
              --title "FTW Raspberry Pi installer" \
              --prerelease \
              --notes "${notes}"
          fi

          # Publish the new immutable image first, then update the small
          # repository document. A cleanup failure can leave an extra
          # old image behind but can never leave os_list.json pointing at a
          # deleted asset.
          gh release upload "${INSTALLER_TAG}" \
            "${ASSET}" "${ASSET}.sha256" \
            --repo "${GITHUB_REPOSITORY}" --clobber
          gh release upload "${INSTALLER_TAG}" os_list.json \
            --repo "${GITHUB_REPOSITORY}" --clobber

          while IFS= read -r old_asset; do
            case "${old_asset}" in
              ftw-rpi4-arm64-*.img.xz|ftw-rpi4-arm64-*.img.xz.sha256)
                if [ "${old_asset}" != "${ASSET_NAME}" ] && [ "${old_asset}" != "${ASSET_NAME}.sha256" ]; then
                  gh release delete-asset "${INSTALLER_TAG}" "${old_asset}" \
                    --repo "${GITHUB_REPOSITORY}" --yes
                fi
                ;;
            esac
          done < <(gh release view "${INSTALLER_TAG}" \
            --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')

          echo "Installer repository: https://github.com/${GITHUB_REPOSITORY}/releases/download/${INSTALLER_TAG}/os_list.json"
