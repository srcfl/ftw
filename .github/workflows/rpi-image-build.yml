name: rpi-image build (on-demand)

# Parallel to the release.yml rpi-image job, but decoupled from
# semantic-release. Use this to:
#   - Get CI signal on PRs that touch the image scaffolding.
#   - Hand-build a fresh image for hardware testing on any branch via
#     the Run workflow button (or `gh workflow run`).
#
# Output lands as a workflow artifact, not a GitHub Release asset —
# release-tagged images still go through release.yml.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Defaults to the ref the workflow was dispatched from.
        required: false
        default: ''
  pull_request:
    # Only re-run when something that actually affects the image
    # changes. Unrelated docs / Go-only PRs don't need 30 min of
    # pi-gen churn.
    paths:
      - 'deploy/pi-gen/**'
      - '.github/workflows/rpi-image-build.yml'
      - 'docker-compose.yml'
      - 'mosquitto/config/**'

# A new push to a PR cancels the previous in-flight build. 30 min is
# too long to chain — we just want the latest.
concurrency:
  group: rpi-image-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # `contents: write` lets the "Attach to PR-preview release" step
  # below upsert a tag + release with the .img.xz attached. Without
  # this, gh-release can't create or update the preview release.
  # Read access is enough for everything else (checkout, build).
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        # pi-gen's chroot stages want ~15 GB; ubuntu-latest ships with
        # ~14 GB free. Same eviction trick as release.yml.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "${AGENT_TOOLSDIRECTORY}"
          sudo docker system prune -af
          df -h /

      - name: Install qemu for arm64 cross-build
        # pi-gen's arm64 (trixie) branch build-docker.sh has a preflight
        # `which qemu-aarch64` and registers an F-flagged binfmt handler
        # pointing at that binary. The interpreter MUST be STATICALLY
        # linked: a dynamic qemu (qemu-user / qemu-user-binfmt) can't
        # resolve its shared libs inside pi-gen's chroot, so arch-test
        # fails with "arm64: not supported" (run 27952017470). So install
        # qemu-user-static (--no-install-recommends keeps the wrapper-
        # registering qemu-user-binfmt out) and expose the static binary
        # under the unsuffixed name the preflight expects, plus
        # tonistiigi/binfmt for F-flagged handlers that survive the chroot
        # mount-namespace switch — the combo that built the bookworm image.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends qemu-user-static
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          sudo docker run --privileged --rm tonistiigi/binfmt --install arm64
          which qemu-aarch64
          echo "--- binfmt_misc qemu-aarch64 handlers ---"
          for f in /proc/sys/fs/binfmt_misc/qemu-aarch64*; do
            echo "== ${f} =="; cat "${f}" 2>/dev/null || true
          done

      - name: Checkout
        uses: actions/checkout@v5
        with:
          # workflow_dispatch can override; pull_request falls through
          # to the PR head SHA (empty string → action's default).
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Build image
        # The pinned pi-gen ref (arm64 / trixie branch commit) lives in
        # deploy/pi-gen/build.sh as the single source of truth — no
        # per-workflow override, so PR builds and release builds use the
        # same base.
        run: deploy/pi-gen/build.sh

      - name: Locate artifact
        id: artifact
        run: |
          set -euo pipefail
          # Pick the stage-42w image specifically — exclude any
          # `…-lite.img.xz` that might come along if SKIP_IMAGES on
          # stage2 isn't honoured for some reason. Naive ls|head
          # would alphabetically prefer the lite variant and ship
          # a stock Raspberry Pi OS Lite — which is exactly what
          # happened in run 24881931326 before this guard.
          shopt -s nullglob
          candidates=( deploy/pi-gen/pi-gen/deploy/*42w-rpi4-arm64.img.xz )
          IMG=""
          for f in "${candidates[@]}"; do
            case "${f}" in
              *-lite.img.xz) continue ;;
            esac
            IMG="${f}"
            break
          done
          if [ -z "${IMG}" ]; then
            echo "pi-gen produced no 42w-rpi4-arm64.img.xz — check build log above" >&2
            ls -lah deploy/pi-gen/pi-gen/deploy/ || true
            exit 1
          fi
          ls -lah "${IMG}"
          echo "path=${IMG}" >> "${GITHUB_OUTPUT}"
          echo "name=$(basename "${IMG}" .img.xz)" >> "${GITHUB_OUTPUT}"

      - name: Upload image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          # Long enough window to grab for real-hardware testing
          # across a normal review cycle.
          retention-days: 14
          if-no-files-found: error

      # ---- PR-preview release ----
      # GitHub auto-wraps every workflow artifact in a .zip, which
      # Raspberry Pi Imager and balenaEtcher refuse to accept (they
      # expect raw .img / .img.xz). Testers had to manually unzip the
      # wrapper before flashing — clunky and surprising.
      #
      # For pull_request events from the same repo (forks get
      # restricted GITHUB_TOKEN scopes and can't write releases), we
      # also attach the .img.xz to a per-PR pre-release tagged
      # `pr-<N>-image-preview`. The release is marked draft so it
      # doesn't pollute the public Releases page; collaborators can
      # still grab the asset from the Releases tab → Drafts. Each
      # rebuild upserts the same tag, so a PR has at most one
      # preview release at any time.
      #
      # Tagged production releases still flow through release.yml
      # untouched.
      - name: Attach to PR-preview release
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}-image-preview
          name: PR #${{ github.event.pull_request.number }} — image preview
          body: |
            Auto-built `.img.xz` for PR #${{ github.event.pull_request.number }}
            (commit `${{ github.event.pull_request.head.sha }}`).

            **Download the asset below directly** — no zip wrapper, ready
            to flash with Raspberry Pi Imager / Etcher / `dd`. This
            release is automatically replaced on each new push to the PR
            and deleted when the PR closes.

            For tagged production releases see the main Releases page.
          files: ${{ steps.artifact.outputs.path }}
          draft: true
          prerelease: true
