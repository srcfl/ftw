name: release

# Changesets-driven release. Pattern lifted from umara/u-front.
#
# This workflow ONLY handles the changesets flow + tag + GitHub Release
# creation. The cross-platform binaries, docker images, and
# Discord announcement live in `release-assets.yml` and are triggered
# explicitly via `gh workflow run release-assets.yml --ref vX.Y.Z` at
# the end of the publish step. Keeping the heavy build matrix out of
# this workflow means regular changeset-PR merges to master don't
# queue + skip ~half a dozen asset jobs on every single push.
#
# Flow:
#   1. PRs land on master, each carrying a `.changeset/*.md` file (or
#      touching only allowlisted paths — see changeset-check.yml).
#   2. This workflow fires on push to master.
#      - `changesets/action` opens / updates a "Version Packages" PR
#        whenever unconsumed changesets exist. We deliberately do NOT
#        pass `publish:` — past experience on admin-next showed
#        `changeset publish` / `changeset tag` silently no-op'd in
#        CI, and the action's built-in `createGithubReleases` defaults
#        to true and 422-collides with our own `gh release create`.
#      - When the Version PR is merged, the next push has no pending
#        changesets, so `steps.changesets.outputs.hasChangesets ==
#        'false'`. The "Tag and create GitHub Release" step then runs
#        idempotently: independent existence checks for the tag and
#        the release let a partial-failure rerun finish the job, then
#        dispatches `release-assets.yml` against the new tag.
#
# Manual workflow_dispatch is still available as an emergency lever
# (e.g. re-running the publish step against partial state) but the
# day-to-day trigger is "Version Packages" PR merge.

on:
  push:
    branches: [master]
    # Every releasable PR adds a changeset. The generated Version Packages PR
    # then changes package/lock/changelog while consuming those files. Those
    # are the only master pushes that need the Changesets orchestration job.
    paths:
      - '.changeset/**'
      - 'package.json'
      - 'package-lock.json'
      - 'CHANGELOG.md'
      - 'scripts/apply-codename.cjs'
      - '.github/workflows/release.yml'
  workflow_dispatch:

# changesets/action needs to push the Version PR. The publish step
# pushes the tag + creates the GH release + dispatches release-assets.
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write   # required by `gh workflow run release-assets.yml` at the end

# Serialize release workflow runs. Two concurrent "push to master"
# events otherwise race on the Version PR branch + tag creation.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: changesets (version PR / publish)
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version:   ${{ steps.publish.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # changesets/action needs full history so it can detect
          # which changesets have already been consumed by past
          # Version PRs (it walks .changeset/ vs CHANGELOG.md).
          fetch-depth: 0
          # Default GITHUB_TOKEN credentials, persisted for the publish
          # step's own git ops (ls-remote + tag push). We deliberately do
          # NOT persist the CI_TOKEN PAT here. The cascade that unblocks the
          # Version PR's required checks is driven entirely by the changesets
          # step's GITHUB_TOKEN env (it pushes the branch + opens the PR as
          # the PAT — see there); persisting a job-wide PAT would only widen
          # blast radius (readable by npm ci and every later step) and, worse,
          # its http.extraheader would silently re-auth the publish step's
          # GITHUB_TOKEN tag push back as the PAT — double-firing
          # release-assets.yml (which listens on `push: tags`).
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          # `version-packages` runs `changeset version` to bump package.json
          # and rewrite CHANGELOG.md, then synchronizes package-lock.json's
          # root package metadata with the generated version.
          # We deliberately do NOT pass `publish:` — see the header
          # comment for the rationale. The publish step below does
          # the tag + GitHub Release manually, idempotently.
          version: npm run version-packages
          title:  "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          # THE load-bearing line. changesets/action uses this token to both
          # open the Version PR (Octokit) and push its branch, using its own
          # auth derived from this env var — independent of the checkout
          # credentials. Using the CI_TOKEN PAT (not the default GITHUB_TOKEN)
          # means the PR `opened` + `synchronize` events come from a real
          # account, which GitHub cascades into `pull_request` workflow runs —
          # so `test.yml` / `changeset-check.yml` fire on the auto-generated
          # Version PR and its required-checks merge button unblocks on its
          # own (GITHUB_TOKEN-authored events never cascade — that was the bug).
          #
          # CI_TOKEN should be a fine-grained PAT scoped to THIS repo with
          # `contents: write` + `pull-requests: write` only — nothing here
          # needs broader scope, and a narrow token bounds the blast radius.
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}

      - name: Tag and create GitHub Release
        id: publish
        # Fires after the Version Packages PR is merged: at that point
        # the consumed `.changeset/*.md` files are gone, so the action
        # reports `hasChangesets == 'false'`. This branch is also
        # entered on every direct push to master that happens to have
        # no pending changesets — the idempotent existence checks
        # below turn those into a clean no-op.
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          TAG_EXISTS=false
          if git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi
          RELEASE_EXISTS=false
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          # Already-done case: a previous run completed cleanly. No
          # new release was cut on THIS run, so the release-assets
          # dispatch below should skip — emit `published=false`.
          if [ "${TAG_EXISTS}" = "true" ] && [ "${RELEASE_EXISTS}" = "true" ]; then
            echo "Tag ${TAG} and GitHub Release already exist — nothing to publish."
            {
              echo "published=false"
              echo "version=${VERSION}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Build codename-annotated release notes. The script extracts
          # the latest section from CHANGELOG.md (between `## <version>`
          # and the next version-shaped heading) and prepends the
          # Hitchhiker codename header.
          node scripts/apply-codename.cjs "${VERSION}" > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

          if [ "${TAG_EXISTS}" = "false" ]; then
            git tag -a "${TAG}" -m "Release ${TAG}"
            # Pushed over origin's persisted GITHUB_TOKEN creds. GITHUB_TOKEN
            # pushes don't cascade workflows, so release-assets.yml's
            # `push: tags` trigger stays dormant and the manual dispatch below
            # remains its single trigger. (This is why checkout must NOT
            # persist the CI_TOKEN PAT — see the Checkout step.)
            git push origin "${TAG}"
          fi

          if [ "${RELEASE_EXISTS}" = "false" ]; then
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --notes-file release-notes.md
          fi

          {
            echo "published=true"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"
          echo "Published ${TAG}"

      - name: Dispatch release-assets workflow
        # GitHub does NOT fire downstream `push: tags` workflows from
        # events created by GITHUB_TOKEN, so the tag push above won't
        # auto-trigger release-assets.yml. workflow_dispatch via gh
        # CLI does. (u-front uses the identical pattern.)
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.publish.outputs.version }}
        run: |
          set -euo pipefail
          echo "Dispatching release-assets.yml for ${TAG}"
          gh workflow run release-assets.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${TAG}"
