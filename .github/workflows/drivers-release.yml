name: drivers-release

on:
  push:
    branches: [master]
    paths:
      - "drivers/**"
      - "go/cmd/ftw-driver-repository/**"
      - "go/internal/driverrepo/publisher.go"
      - "go/internal/driverrepo/versioncheck.go"
      - ".github/workflows/drivers-release.yml"
  workflow_dispatch:
    inputs:
      channel:
        description: Driver channel to publish from the selected Git ref
        type: choice
        required: true
        default: edge
        options: [edge, beta, stable]

permissions:
  contents: write

concurrency:
  group: drivers-release-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'edge' }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish signed driver repository
    runs-on: ubuntu-latest
    env:
      FTW_DRIVER_KEY_ID: ftw-drivers-2026-01
      FTW_DRIVER_SIGNING_KEY: ${{ secrets.FTW_DRIVER_SIGNING_KEY }}
      # Public trust roots are safe to version. Keeping this beside the runtime
      # default makes key rotation reviewable and prevents a mutable repository
      # variable from silently changing who can sign production drivers.
      FTW_DRIVER_SIGNING_PUBLIC_KEY: MX+j27UBkyM099hTyJlmMLK9qlTTDUJsaK/vH12fFKc=
    steps:
      - name: Checkout selected source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go/go.sum

      - name: Require signing configuration
        run: |
          set -euo pipefail
          test -n "${FTW_DRIVER_SIGNING_KEY}" || { echo "Missing FTW_DRIVER_SIGNING_KEY Actions secret"; exit 1; }

      - name: Select channel
        id: channel
        env:
          REQUESTED_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'edge' }}
        run: |
          set -euo pipefail
          tag="drivers-${REQUESTED_CHANNEL}"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          echo "name=${REQUESTED_CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "base_url=${base_url}" >> "${GITHUB_OUTPUT}"

      - name: Build signed publication
        working-directory: go
        run: >-
          go run ./cmd/ftw-driver-repository publish
          -drivers ../drivers
          -output ../dist/driver-repository
          -base-url "${{ steps.channel.outputs.base_url }}"
          -repository "https://github.com/${GITHUB_REPOSITORY}"
          -commit "${GITHUB_SHA}"
          -key-id "${FTW_DRIVER_KEY_ID}"

      - name: Verify signature and every artifact
        working-directory: go
        run: >-
          go run ./cmd/ftw-driver-repository verify
          -manifest ../dist/driver-repository/manifest.json
          -artifacts ../dist/driver-repository
          -key-id "${FTW_DRIVER_KEY_ID}"

      - name: Create channel release when missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.channel.outputs.tag }}
          CHANNEL: ${{ steps.channel.outputs.name }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            prerelease=()
            if [ "${CHANNEL}" != stable ]; then
              prerelease=(--prerelease)
            fi
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "FTW drivers (${CHANNEL})" \
              --notes "Moving ${CHANNEL} channel for independently released FTW Lua drivers. Trust manifest.json only after Ed25519 verification." \
              --latest=false \
              "${prerelease[@]}"
          fi

      - name: Upload immutable artifacts before channel manifest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail
          artifacts=(dist/driver-repository/driver-*.lua)
          test -e "${artifacts[0]}"
          gh release upload "${TAG}" "${artifacts[@]}" --clobber
          gh release upload "${TAG}" dist/driver-repository/manifest.payload.json --clobber
          # Publish the signed channel pointer last so clients can never observe
          # a manifest before all content-addressed artifacts are available.
          gh release upload "${TAG}" dist/driver-repository/manifest.json --clobber
