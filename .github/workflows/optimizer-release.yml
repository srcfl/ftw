name: optimizer release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Publish beta first, then promote the exact commit to stable
        required: true
        type: choice
        default: beta
        options: [beta, stable]
      version:
        description: Optimizer SemVer without prefix (for example 1.3.2-beta.1 or 1.3.2)
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: optimizer-${{ inputs.channel }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate independent optimizer version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      alias: ${{ steps.version.outputs.alias }}
      image_exists: ${{ steps.version.outputs.image_exists }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: docker/setup-buildx-action@v3

      - id: version
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          verify_image_metadata() {
            local image_ref="$1"
            local expected_version="$2"
            local metadata="${RUNNER_TEMP}/optimizer-image-${expected_version}.json"
            docker buildx imagetools inspect "${image_ref}" --format '{{json .Image}}' > "${metadata}"
            python3 - "${metadata}" "${GITHUB_SHA}" "${expected_version}" <<'PY'
          import json
          import sys

          path, expected_revision, expected_version = sys.argv[1:]
          with open(path, encoding="utf-8") as source:
              images = json.load(source)
          if not images:
              raise SystemExit("optimizer image has no platform metadata")
          for platform, image in images.items():
              labels = image.get("config", {}).get("Labels", {})
              revision = labels.get("org.opencontainers.image.revision")
              version = labels.get("org.opencontainers.image.version")
              if revision != expected_revision or version != expected_version:
                  raise SystemExit(
                      f"optimizer image metadata mismatch for {platform}: "
                      f"revision={revision!r} version={version!r}"
                  )
          PY
          }
          package_version="$(python3 - <<'PY'
          import tomllib
          with open('optimizer/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          PY
          )"
          PYTHONPATH=optimizer python3 -m ftw_optimizer.release_version "${package_version}"
          if [ "${CHANNEL}" = beta ]; then
            [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]] || {
              echo "beta version must match X.Y.Z-beta.N" >&2; exit 1;
            }
            base="${VERSION%-beta.*}"
            alias=beta
          else
            [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
              echo "stable version must match X.Y.Z" >&2; exit 1;
            }
            base="${VERSION}"
            alias=latest
          fi
          [ "${base}" = "${package_version}" ] || {
            echo "${VERSION} does not match optimizer/pyproject.toml ${package_version}" >&2; exit 1;
          }
          if [ "${CHANNEL}" = stable ]; then
            git fetch --tags --force
            beta_tag="$(git tag --list "optimizer-v${VERSION}-beta.*" --sort=-v:refname | head -n 1)"
            [ -n "${beta_tag}" ] || {
              echo "No optimizer-v${VERSION}-beta.N tag exists; publish and validate beta first." >&2; exit 1;
            }
            [ "$(git rev-list -n 1 "${beta_tag}")" = "${GITHUB_SHA}" ] || {
              echo "${beta_tag} is not this exact stable candidate commit." >&2; exit 1;
            }
            [ "$(gh release view "${beta_tag}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq .isPrerelease)" = true ] || {
              echo "${beta_tag} is not a published beta release." >&2; exit 1;
            }
            beta_image_tag="${beta_tag#optimizer-}"
            beta_image_ref="ghcr.io/srcfl/ftw-optimizer:${beta_image_tag}"
            docker buildx imagetools inspect "${beta_image_ref}" >/dev/null || {
              echo "The published beta image ${beta_image_tag} is unavailable." >&2; exit 1;
            }
            verify_image_metadata "${beta_image_ref}" "${beta_image_tag}"
          fi
          release_tag="optimizer-v${VERSION}"
          image_tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${release_tag}:refs/tags/${release_tag}"
            [ "$(git rev-list -n 1 "${release_tag}")" = "${GITHUB_SHA}" ] || {
              echo "${release_tag} already points at another commit" >&2; exit 1;
            }
          fi

          image_ref="ghcr.io/srcfl/ftw-optimizer:${image_tag}"
          image_exists=false
          if docker buildx imagetools inspect "${image_ref}" >/dev/null 2>&1; then
            verify_image_metadata "${image_ref}" "${image_tag}"
            image_exists=true
          fi
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "alias=${alias}" >> "${GITHUB_OUTPUT}"
          echo "image_exists=${image_exists}" >> "${GITHUB_OUTPUT}"

  test:
    name: test optimizer release candidate
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: optimizer/pyproject.toml
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Install Optimizer
        run: pip install -e 'optimizer[test]'
      - name: Python tests
        run: pytest -q optimizer/tests
      - name: Self-update version contract
        working-directory: go
        run: go test -count=1 ./internal/selfupdate
      - name: Core and Optimizer contract
        working-directory: go
        env:
          FTW_TEST_OPTIMIZER_PYTHON: python
        run: >-
          go test -count=1 ./internal/mpc
          -run 'TestExternalOptimizer(EndToEnd|PlansMultipleLoadpoints|PlansAndValidatesMultipleStorages)$'

  publish:
    name: build optimizer image
    needs: [validate, test]
    if: needs.validate.outputs.image_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.SOURCEFUL_GHCR_USER || github.actor }}
          password: ${{ secrets.SOURCEFUL_GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.optimizer
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/srcfl/ftw-optimizer:${{ needs.validate.outputs.image_tag }}
            ghcr.io/srcfl/ftw-optimizer:${{ needs.validate.outputs.alias }}
          labels: |
            org.opencontainers.image.source=https://github.com/srcfl/ftw
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.image_tag }}
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            VERSION=${{ needs.validate.outputs.image_tag }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=optimizer
          cache-to: type=gha,mode=max,scope=optimizer

  release:
    name: publish optimizer GitHub release
    needs: [validate, test, publish]
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        needs.test.result == 'success' &&
        (needs.publish.result == 'success' || needs.publish.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.release_tag }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            [ "$(git rev-list -n 1 "${TAG}")" = "${GITHUB_SHA}" ] || {
              echo "${TAG} already points at another commit" >&2; exit 1;
            }
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "FTW optimizer ${TAG#optimizer-}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
          fi
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            exit 0
          fi
          prerelease=()
          if [ "${CHANNEL}" = beta ]; then prerelease=(--prerelease); fi
          gh release create "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            --title "FTW optimizer ${TAG#optimizer-}" --generate-notes --latest=false "${prerelease[@]}"
