name: rpi-image preview cleanup

# Deletes the per-PR draft preview release + tag created by
# rpi-image-build.yml when the PR closes (merged or rejected).
# Without this, draft releases pile up indefinitely under the
# Releases → Drafts tab.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: rpi-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  delete-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: pr-${{ github.event.pull_request.number }}-image-preview
          REPO: ${{ github.repository }}
        run: |
          echo "Attempting to delete preview release ${TAG}..."
          # Draft releases do not always have a real git tag, and `gh release
          # delete <tag>` can therefore miss them. Resolve the draft by its API
          # release ID first; this is also reliable after a repository transfer.
          release_id="$({
            gh api --paginate "repos/${REPO}/releases?per_page=100" \
              --jq '.[] | [.id, .tag_name, .draft] | @tsv'
          } | awk -F '\t' -v tag="${TAG}" '$2 == tag && $3 == "true" { id=$1 } END { print id }')"
          if [ -n "${release_id}" ]; then
            gh api "repos/${REPO}/releases/${release_id}" -X DELETE
            echo "Deleted draft release id=${release_id}."
          else
            echo "No draft release with tag ${TAG}; nothing to delete."
          fi

          # A published/partially-created preview can have a backing tag. Drafts
          # normally do not, so probe before issuing the ancillary delete.
          if gh api "repos/${REPO}/git/ref/tags/${TAG}" --silent \
            -H 'Accept: application/vnd.github+json' >/dev/null 2>&1; then
            gh api "repos/${REPO}/git/refs/tags/${TAG}" -X DELETE
            echo "Deleted backing tag."
          fi
