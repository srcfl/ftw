name: test

# Heavy suites run independently so Go, Python and browser work do not queue
# behind one another. The final job keeps the historical required-check name.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: classify changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.paths.outputs.core }}
      optimizer: ${{ steps.paths.outputs.optimizer }}
      web: ${{ steps.paths.outputs.web }}
      drivers: ${{ steps.paths.outputs.drivers }}
      compose: ${{ steps.paths.outputs.compose }}
      base_sha: ${{ steps.paths.outputs.base_sha }}
      head_sha: ${{ steps.paths.outputs.head_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: paths
        name: Classify changed paths
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          core=false
          optimizer=false
          web=false
          drivers=false
          compose=false

          if { [ "${EVENT_NAME}" = pull_request ] && [[ "${PR_TITLE}" == "chore(release): version packages"* ]]; } || \
             { [ "${EVENT_NAME}" = push ] && [[ "${COMMIT_MESSAGE}" == "chore(release): version packages"* ]]; }; then
            echo "Generated Version Packages change; skipping implementation suites."
          else
            if [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
              BASE_SHA="$(git rev-parse HEAD^)"
            fi
            while IFS= read -r file; do
              [ -n "${file}" ] || continue
              case "${file}" in
                go/*|drivers/*|config*.yaml|Dockerfile|Dockerfile.updater|.dockerignore)
                  core=true
                  ;;
                optimizer/*|Dockerfile.optimizer|go/internal/mpc/*|go/cmd/ftw/main.go)
                  optimizer=true
                  ;;
                web/*|package.json|package-lock.json)
                  web=true
                  ;;
                drivers/*.lua)
                  drivers=true
                  ;;
                Dockerfile|Dockerfile.optimizer|docker-compose*.yml|scripts/enable-modular-stack.sh|scripts/migrate-legacy-compose.sh|scripts/test-modular-compose.sh|scripts/test-container-boundaries.sh|scripts/install-macos.sh)
                  compose=true
                  ;;
                Makefile|.github/workflows/test.yml)
                  core=true
                  optimizer=true
                  web=true
                  drivers=true
                  compose=true
                  ;;
              esac
              case "${file}" in
                optimizer/*|Dockerfile.optimizer|go/internal/mpc/*|go/cmd/ftw/main.go)
                  optimizer=true
                  ;;
              esac
              case "${file}" in
                drivers/*.lua)
                  drivers=true
                  ;;
              esac
            done < <(git diff --name-only "${BASE_SHA}"..."${HEAD_SHA}")
          fi

          {
            echo "core=${core}"
            echo "optimizer=${optimizer}"
            echo "web=${web}"
            echo "drivers=${drivers}"
            echo "compose=${compose}"
            echo "base_sha=${BASE_SHA}"
            echo "head_sha=${HEAD_SHA}"
          } >> "${GITHUB_OUTPUT}"

  core:
    name: core (Go)
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Vet
        working-directory: go
        run: go vet ./...
      - name: Test
        working-directory: go
        run: go test -count=1 ./...

  optimizer:
    name: optimizer (Python + contract)
    needs: changes
    if: needs.changes.outputs.optimizer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: optimizer/pyproject.toml
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Install
        run: pip install -e 'optimizer[test]'
      - name: Python tests
        run: pytest -q optimizer/tests
      - name: Core ↔ optimizer contract
        working-directory: go
        env:
          FTW_TEST_OPTIMIZER_PYTHON: python
        run: >-
          go test -count=1 ./internal/mpc
          -run 'TestExternalOptimizer(EndToEnd|PlansMultipleLoadpoints|PlansAndValidatesMultipleStorages)$'

  web:
    name: web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm test

  drivers:
    name: drivers
    needs: changes
    if: needs.changes.outputs.drivers == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Validate publication
        working-directory: go
        run: >-
          go run ./cmd/ftw-driver-repository publish
          -unsigned -drivers ../drivers
          -output "${RUNNER_TEMP}/ftw-driver-publication"
          -base-url https://example.invalid/releases/download/drivers-ci
          -repository https://github.com/${GITHUB_REPOSITORY}
          -commit "${GITHUB_SHA}"
      - name: Require version bumps
        working-directory: go
        run: >-
          go run ./cmd/ftw-driver-repository check-versions
          -repo-root ..
          -base "${{ needs.changes.outputs.base_sha }}"
          -head "${{ needs.changes.outputs.head_sha }}"

  compose:
    name: module boundaries
    needs: changes
    if: needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: make compose-migration-test container-boundary-test

  e2e:
    name: full stack
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - run: make e2e

  test:
    name: go test + vet
    if: always()
    needs: [changes, core, optimizer, web, drivers, compose, e2e]
    runs-on: ubuntu-latest
    env:
      RESULTS: >-
        ${{ needs.changes.result }} ${{ needs.core.result }}
        ${{ needs.optimizer.result }} ${{ needs.web.result }}
        ${{ needs.drivers.result }} ${{ needs.compose.result }}
        ${{ needs.e2e.result }}
    steps:
      - name: Require every selected suite to pass
        run: |
          case " ${RESULTS} " in
            *" failure "*|*" cancelled "*) exit 1 ;;
          esac
          echo "Selected suites passed: ${RESULTS}"
