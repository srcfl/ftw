name: edge channel

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-channel
  cancel-in-progress: true

jobs:
  meta:
    name: derive immutable edge tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          TAG="edge-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ${TAG} from ${GITHUB_REF}"

  docker:
    name: edge docker (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: main
            dockerfile: ./Dockerfile
            image_suffix: ""
          - target: updater
            dockerfile: ./Dockerfile.updater
            image_suffix: "-updater"
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}:${{ needs.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.tag }}
          build-args: |
            VERSION=${{ needs.meta.outputs.tag }}
          cache-from: type=gha,scope=edge-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=edge-${{ matrix.target }}
