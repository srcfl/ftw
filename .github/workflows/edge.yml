name: edge channel

on:
  push:
    branches: [master]
    # Only files copied into, compiled into, or used to publish the images can
    # change an edge digest. Release metadata and documentation must not spend
    # 15-20 minutes rebuilding an identical runtime.
    paths:
      - '.github/workflows/edge.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'Dockerfile.updater'
      - 'LICENSE'
      - 'NOTICE'
      - 'go/**'
      - 'optimizer/**'
      - 'drivers/**'
      - 'web/**'
      - 'scripts/inspect-image-digest.sh'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-channel
  cancel-in-progress: true

jobs:
  meta:
    name: derive immutable edge tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          TAG="edge-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ${TAG} from ${GITHUB_REF}"

  docker:
    name: edge docker (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: main
            dockerfile: ./Dockerfile
            image_suffix: ""
          - target: updater
            dockerfile: ./Dockerfile.updater
            image_suffix: "-updater"
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to canonical GHCR namespace
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.SOURCEFUL_GHCR_USER || github.actor }}
          password: ${{ secrets.SOURCEFUL_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and publish edge image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/srcfl/ftw${{ matrix.image_suffix }}:${{ needs.meta.outputs.tag }}
            ghcr.io/srcfl/ftw${{ matrix.image_suffix }}:edge
          labels: |
            org.opencontainers.image.source=https://github.com/srcfl/ftw
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.tag }}
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            VERSION=${{ needs.meta.outputs.tag }}
          # Share content-addressed layers with beta and stable. Channel tags
          # change, but dependency/runtime layers overwhelmingly do not.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Login to compatibility GHCR namespace
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: frahlg
          password: ${{ secrets.LEGACY_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Mirror exact edge manifests to compatibility namespace
        env:
          IMAGE_SUFFIX: ${{ matrix.image_suffix }}
          IMMUTABLE_TAG: ${{ needs.meta.outputs.tag }}
          SOURCE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "${SOURCE_DIGEST}"
          for tag in "${IMMUTABLE_TAG}" edge; do
            source="ghcr.io/srcfl/ftw${IMAGE_SUFFIX}:${tag}"
            legacy="ghcr.io/frahlg/forty-two-watts${IMAGE_SUFFIX}:${tag}"
            docker buildx imagetools create --prefer-index=false --tag "${legacy}" "${source}"
            legacy_digest="$(scripts/inspect-image-digest.sh "${legacy}")"
            test "${SOURCE_DIGEST}" = "${legacy_digest}"
          done
