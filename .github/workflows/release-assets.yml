name: release-assets

# Build + publish the artefacts that accompany a tagged release:
#   - cross-platform main binaries (linux amd64/arm64, windows amd64)
#   - docker images for core + updater + optimizer pushed to GHCR
#   - Discord release announcement
#
# Triggered by `release.yml` via `gh workflow run release-assets.yml
# --ref vX.Y.Z` immediately after the tag + GitHub Release are created.
# Also listens directly on `push: tags: ['v*']` so a hand-pushed tag
# (e.g. via `git push origin vX.Y.Z` from a maintainer's laptop) does
# the same thing — but in the normal Changesets flow that won't fire
# because the bot-pushed tag from release.yml doesn't cascade workflow
# runs.
#
# Splitting these jobs out of release.yml means:
#   - regular changeset-PR merges to master don't queue + skip a half
#     dozen asset jobs every time.
#   - asset builds run on the tag ref directly — no need for the meta
#     job to thread `outputs.version` from a different workflow run.
#   - failures here don't block the next release; a re-run is a clean
#     `gh workflow run release-assets.yml --ref vX.Y.Z`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z) — defaults to the tag this workflow is dispatched against"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write   # upload release assets + read tag refs
  packages: write   # push to GHCR

# Multiple tags shouldn't trample each other. ref-scoped concurrency
# group means dispatching v0.102.4 won't cancel an in-flight v0.102.3.
concurrency:
  group: release-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: derive tag + version
    runs-on: ubuntu-latest
    # Beta tags have their own lightweight channel workflow and must never
    # retag :latest or publish stable Discord announcements.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    outputs:
      tag:     ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Derive tag/version from ref
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          # Priority order:
          #   1. explicit workflow_dispatch `tag` input (operator override).
          #   2. github.ref when it's a tag ref (set by `--ref` on dispatch
          #      OR by `push: tags`).
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
          else
            echo "release-assets must be dispatched against a v* tag (got ref=${GITHUB_REF})" >&2
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${TAG} doesn't look like a vX.Y.Z release tag" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Building assets for ${TAG} (version ${VERSION})"

  binaries:
    name: build + upload release binaries
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: write  # upload assets to the release
    strategy:
      # fail-fast off: if one platform breaks, still get assets for the
      # others uploaded so users aren't blocked by a single bad target.
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          # Check out the tag so -X main.Version matches what users install.
          ref: ${{ needs.meta.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.meta.outputs.tag }}
        working-directory: go
        run: |
          mkdir -p ../bin
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../bin/ftw-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/ftw
          ls -la "../bin/ftw-${GOOS}-${GOARCH}${{ matrix.ext }}"

      - name: Package
        env:
          PLATFORM: ${{ matrix.goos }}-${{ matrix.goarch }}
          BINARY: ftw-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p release
          STAGE="bin/stage-${PLATFORM}"
          rm -rf "${STAGE}"
          mkdir -p "${STAGE}"
          if [[ "${ARCHIVE}" == "zip" ]]; then
            cp "bin/${BINARY}" "${STAGE}/ftw.exe"
            cp "bin/${BINARY}" "${STAGE}/forty-two-watts.exe"
            (cd "${STAGE}" && zip -q "../../release/ftw-${PLATFORM}.zip" ftw.exe forty-two-watts.exe)
            zip -qr "release/ftw-${PLATFORM}.zip" \
              drivers web optimizer/pyproject.toml optimizer/ftw_optimizer config.example.yaml LICENSE NOTICE
            cp "release/ftw-${PLATFORM}.zip" "release/forty-two-watts-${PLATFORM}.zip"
          else
            cp "bin/${BINARY}" "${STAGE}/ftw"
            ln -s ftw "${STAGE}/forty-two-watts"
            tar czf "release/ftw-${PLATFORM}.tar.gz" \
              -C "${STAGE}" ftw forty-two-watts \
              -C ../.. drivers web optimizer/pyproject.toml optimizer/ftw_optimizer config.example.yaml LICENSE NOTICE
            cp "release/ftw-${PLATFORM}.tar.gz" "release/forty-two-watts-${PLATFORM}.tar.gz"
          fi
          (
            cd release
            sha256sum "ftw-${PLATFORM}.${ARCHIVE}" > "ftw-${PLATFORM}.${ARCHIVE}.sha256"
            sha256sum "forty-two-watts-${PLATFORM}.${ARCHIVE}" > "forty-two-watts-${PLATFORM}.${ARCHIVE}.sha256"
          )
          ls -la release/

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          ASSET: release/ftw-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          LEGACY_ASSET: release/forty-two-watts-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
        # --clobber lets a workflow re-run replace a prior upload without
        # failing — useful when this workflow is re-dispatched manually.
        run: gh release upload "${TAG}" "${ASSET}" "${ASSET}.sha256" "${LEGACY_ASSET}" "${LEGACY_ASSET}.sha256" --clobber

  docker:
    name: docker build + push (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: meta
    # Build core, updater, and the independently restartable optimizer from
    # the same release commit. Runtime compatibility is still negotiated by
    # protocol rather than requiring versions to match.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: main
            dockerfile: ./Dockerfile
            image_suffix: ""
            title: FTW
            description: Unified Home Energy Management System
          - target: updater
            dockerfile: ./Dockerfile.updater
            image_suffix: "-updater"
            title: FTW updater
            description: Sidecar that executes docker compose pull + up for in-app updates
          - target: optimizer
            dockerfile: ./Dockerfile.optimizer
            image_suffix: "-optimizer"
            title: FTW optimizer
            description: Independently updatable mathematical planning sidecar
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to canonical GHCR namespace
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.SOURCEFUL_GHCR_USER || github.actor }}
          password: ${{ secrets.SOURCEFUL_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/srcfl/ftw${{ matrix.image_suffix }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.tag }}
            type=raw,value=${{ needs.meta.outputs.version }}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/srcfl/ftw
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.meta.outputs.tag }}
            BUILD_SHA=${{ github.sha }}
          # Use the GHA cache backend so subsequent builds reuse layers.
          # Per-target scope keeps main + updater from evicting each other.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.target }}

      # Docker stores one credential per registry host, so two consecutive
      # ghcr.io logins cannot be active at once. Build and publish once to the
      # canonical namespace, then copy that exact multi-platform manifest to
      # the temporary compatibility namespace under its own credentials.
      - name: Login to compatibility GHCR namespace
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: frahlg
          password: ${{ secrets.LEGACY_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Mirror exact manifests to compatibility namespace
        env:
          CANONICAL_TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "${SOURCE_DIGEST}"
          for source in ${CANONICAL_TAGS}; do
            legacy="${source/ghcr.io\/srcfl\/ftw/ghcr.io\/frahlg\/forty-two-watts}"
            docker buildx imagetools create --prefer-index=false --tag "${legacy}" "${source}"
            legacy_digest="$(scripts/inspect-image-digest.sh "${legacy}")"
            test "${SOURCE_DIGEST}" = "${legacy_digest}"
          done

  discord:
    name: announce release on Discord
    runs-on: ubuntu-latest
    # Wait for binaries + docker so the message links to assets that
    # actually exist. The independent rpi-installer channel is intentionally
    # outside the application release critical path.
    needs: [meta, binaries, docker]
    permissions:
      contents: read   # gh release view needs read access
    steps:
      - name: Post release announcement
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO:            ${{ github.repository }}
          IMAGE_REPO:      srcfl/ftw
          VERSION:         ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_WEBHOOK secret not set — skipping announcement."
            exit 0
          fi

          RELEASE_URL="https://github.com/${REPO}/releases/tag/${VERSION}"
          IMAGE_MAIN="ghcr.io/${IMAGE_REPO}:${VERSION}"
          IMAGE_UPDATER="ghcr.io/${IMAGE_REPO}-updater:${VERSION}"

          # Pull the release body (changelog) the publish step wrote.
          # Truncated to 3500 chars so the embed description stays under
          # Discord's 4096-char limit even after we add the trailer.
          BODY="$(gh release view "${VERSION}" --repo "${REPO}" --json body --jq .body || echo '')"
          if [ "${#BODY}" -gt 3500 ]; then
            BODY="${BODY:0:3500}"$'\n\n…truncated. Full notes: '"${RELEASE_URL}"
          fi
          if [ -z "${BODY}" ]; then
            BODY="Release ${VERSION} is live. See ${RELEASE_URL} for details."
          fi

          # jq builds the JSON so embedded backticks / newlines / quotes
          # in the changelog can't break out of the payload string.
          # Code-fence the image refs with a literal backtick char (`)
          # so the markdown renders as inline code in Discord.
          PAYLOAD="$(jq -n \
            --arg title "🚀 FTW ${VERSION}" \
            --arg url   "${RELEASE_URL}" \
            --arg desc  "${BODY}" \
            --arg main  "${IMAGE_MAIN}" \
            --arg upd   "${IMAGE_UPDATER}" \
            '{
              username: "FTW",
              embeds: [{
                title: $title,
                url:   $url,
                color: 16753920,
                description: $desc,
                fields: [
                  { name: "Main image",    value: ("`" + $main + "`"), inline: false },
                  { name: "Updater image", value: ("`" + $upd  + "`"), inline: false }
                ],
                footer: { text: ("github.com/" + env.REPO) },
                timestamp: (now | todateiso8601)
              }]
            }')"

          # Post — fail the step on non-2xx so a broken webhook doesn't
          # silently swallow an announcement.
          curl -sS -f -X POST \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${DISCORD_WEBHOOK}"
