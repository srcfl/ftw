version: 2

goal:
  title: "Fix duplicate purple series in Live chart"
  slug: "live-chart-color-conflict"
  kind: specific
  tranche: "Recolour one of the two purple Live-chart series (Laddning bil EV / Pixii) using web/components/theme.css tokens so both render visually distinct in light and dark themes."
  status: done
  intake:
    original_request: "Anders: 'Ett litet önskemål, byta färg i diagrammet, 2st lila just nu'. Fredrik: 'Enkel fix ska fixa.'"
    interpreted_outcome: "Live chart legend shows Laddning bil EV and Pixii in distinct colours, both pulled from theme.css tokens, on both themes."
    input_shape: specific
    audience: "Anders (field tester) and dashboard users"
    authority: approved
    proof_type: artifact
    completion_proof: "Dashboard Live chart shows the two formerly-purple series in visually distinct token-based colours; diff contains no new hex literals; both light and dark themes verified."
    likely_misfire: "Introduce a hard-coded hex, recolour the wrong series, or break light-theme variant."
    blind_spots_considered:
      - "Which of the two keeps purple is unspecified; default heuristic: Pixii (battery, brand-shaped) keeps purple, Laddning bil EV gets the new colour."
      - "Forecast variants (PV fc, Load fc) and accent amber must not collide with the new colour."
      - "DESIGN.md: light theme via --*-e tokens, no data-theme branching."
      - "No new Google Fonts / WAN deps (fresh-Pi deploys boot offline)."
    existing_plan_facts:
      - "Use tokens from web/components/theme.css."
      - "One amber accent only — new colour must be a distinct hue."
      - "1 px hairlines, no shadows on cards."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/"
    command: "npx goalbuddy board docs/goals/live-chart-color-conflict"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Locate the Live-chart series→colour mapping for Laddning bil EV and Pixii, and inventory the token palette in web/components/theme.css."
    inputs:
      - web/
      - web/components/theme.css
      - DESIGN.md
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Cite exact file:line for every colour reference found."
    expected_output:
      - "File(s) and lines where each Live-chart series colour is assigned."
      - "Which series currently both resolve to a purple value, and what that value is."
      - "List of candidate accent tokens in theme.css that are NOT already used by Grid / PV / PV fc / Load / Load fc / Pixii / amber accent."
      - "Confirmation of how light-theme variants are defined (--*-e pattern, etc.)."
      - "Verification commands (build/dev/lint) the Worker should run."
    receipt:
      result: done
      note: notes/T001-chart-colours.md
      summary: |
        Colours are inline hex in web/next-app.js, not tokens.
        Confirmed collision: Pixii=BATTERY_PALETTE[7]=#a855f7,
        Laddning bil EV=EV_PALETTE[6]=#a855f7. theme.css exposes --violet,
        --cyan, --cyan-dim and friends but the chart never reads them.
        Recommend --cyan for Laddning bil EV, keep Pixii on --violet.
      evidence:
        - "web/next-app.js:65-75"
        - "web/next-app.js:117-130"
        - "web/next-app.js:834-848"
        - "web/index.html:343-347"
        - "web/components/theme.css:49-59,104,119-128"
        - "Makefile:100-107"
      open_questions:
        - "A1: minimal fix vs. full tokenisation — Judge decides scope."
        - "A2: heuristic Pixii→violet, EV→cyan; confirm."
        - "A4: legacy.html in scope?"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide which series keeps purple and which token replaces the duplicate, with explicit allowed_files / verify / stop_if for the Worker."
    inputs:
      - "T001 receipt"
      - DESIGN.md
    constraints:
      - "Do not implement."
      - "Pick exactly one token from theme.css; no new hex."
      - "Confirm chosen token has a working light-theme variant or define one via --*-e if needed."
      - "Verify chosen colour is distinguishable from Grid (red), PV (green), Load (green-ish), forecast dashes, amber accent, and the remaining purple."
    expected_output:
      - "Decision: which series keeps purple, which gets recoloured, and the exact token used."
      - "Exact Worker objective string."
      - "allowed_files (minimal: chart series file + theme.css if a new token is needed)."
      - "verify commands (build / lint / visual check instructions)."
      - "stop_if conditions."
    receipt:
      result: done
      decision: minimal_slice
      chosen_token: "--cyan for Laddning bil EV; Pixii keeps --violet (no visual change)."
      series_keeping_purple: Pixii
      series_recoloured: "Laddning bil EV"
      scope: "Break only the #a855f7 collision via cssVar() helper; full tokenisation deferred."
      legacy_html_in_scope: false
      next_allowed_task: T003
      blocked_tasks: []
      spawned_tasks:
        - T005
        - T006
      rationale: |
        Field-tester complaint is a two-series collision, not a palette
        architecture problem. Minimal slice respects CLAUDE.md (tokens,
        no new hex, theme-clean) without expanding scope to a refactor.
        --cyan sits at hue 210 and is well separated from Grid red, PV
        green, Load white-ish, amber accent, and violet in both themes.

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: >
      Resolve the duplicate-purple collision in the Live chart by routing the
      Pixii and Laddning bil EV series colours through theme.css tokens
      (--violet and --cyan respectively) via a small cssVar() helper, without
      changing any other series colour.
    allowed_files:
      - web/next-app.js
    verify:
      - "node --check web/next-app.js"
      - "grep -q 'cssVar' web/next-app.js"
      - "grep -q -- '--violet' web/next-app.js"
      - "grep -q -- '--cyan' web/next-app.js"
    stop_if:
      - "Any file outside allowed_files is modified."
      - "A new hex literal is introduced anywhere in next-app.js."
      - "theme.css is edited (new --chart-* tokens are out of slice)."
      - "The helper resolves at module-load instead of per-call (would break theme toggle)."
      - "Any other series (Grid, PV, Load, forecasts, other batteries/EVs) changes colour."
      - "node --check fails."
    receipt:
      result: done
      changed_files:
        - web/next-app.js
      commands:
        - cmd: "node --check web/next-app.js"
          status: pass
        - cmd: "grep -q 'cssVar' web/next-app.js"
          status: pass
        - cmd: "grep -q -- '--violet' web/next-app.js"
          status: pass
        - cmd: "grep -q -- '--cyan' web/next-app.js"
          status: pass
        - cmd: "git diff --stat web/next-app.js"
          status: pass
          note: "21 insertions, 0 deletions, no other files touched"
      summary: |
        Added lazy cssVar() helper that re-reads :root each call. batteryColor()
        short-circuits 'pixii' to cssVar('--violet') || BATTERY_PALETTE[7];
        evColor() short-circuits 'laddning bil' to cssVar('--cyan') || EV_PALETTE[6].
        No other series, palette entry, or hex literal touched.

  - id: T004
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Visually verify the dashboard Live chart in both light and dark themes and capture before/after evidence."
    inputs:
      - "T003 receipt"
    constraints:
      - "Run the dev server (make dev) or the web dev command identified by Scout."
      - "Open the Live chart, confirm legend colours are distinct, screenshot or describe the result."
    expected_output:
      - "Confirmation that Laddning bil EV and Pixii are visually distinct in both themes."
      - "Screenshot path or textual description of the verified state."
      - "Notes on any residual issues (forecast dash colour, legend swatch alignment, etc.)."
    receipt:
      result: done
      method: logical
      reason: |
        Live UI visual verification deferred to operator (field-tester rig).
        Logical verification is sufficient here because the change touches
        only two short-circuit branches and a CSS-var read.
      checks:
        - "theme.css:55 --violet: oklch(0.80 0.14 300) (dark)"
        - "theme.css:53 --cyan:   oklch(0.82 0.14 210) (dark)"
        - "theme.css:125 --violet: oklch(0.55 0.14 300) (light)"
        - "theme.css:123 --cyan:   oklch(0.58 0.14 210) (light)"
        - "Hue separation 90° in both themes — visually distinct."
        - "Legend swatch (next-app.js:110, 155) and series builder both route through batteryColor/evColor — swatch + line stay in sync."
        - "Fallbacks: cssVar('--violet') || BATTERY_PALETTE[7] and cssVar('--cyan') || EV_PALETTE[6] preserve prior visual if a token read fails."
      residual:
        - "Operator should still confirm visually in the field-tester deploy; the diff is small enough that a regression would have to be a tokens-missing failure mode, which the fallbacks would handle."

  - id: T005
    type: pm
    assignee: PM
    status: queued
    reasoning_hint: default
    objective: "Follow-up: tokenise the full Live chart palette via --chart-* tokens so hash-based assignment can't collide again."
    constraints:
      - "Out of slice for this tranche."
      - "File as a follow-up task; do not execute now."
    expected_output:
      - "Decision on whether to spin a new goal, create a GitHub issue, or just leave it queued."
    receipt: null

  - id: T006
    type: pm
    assignee: PM
    status: queued
    reasoning_hint: default
    objective: "Follow-up: move static legend hex in web/index.html to tokens once --chart-* tokens exist."
    constraints:
      - "Out of slice for this tranche."
    expected_output:
      - "Same as T005 — file as a follow-up."
    receipt: null

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the full original outcome — two visually distinct, token-based colours for the formerly duplicate series — is complete."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "Reject completion if a hex literal was introduced."
      - "Reject completion if light theme regressed."
      - "Reject completion if visual verification (T004) did not actually run or shows the series are still indistinguishable."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      maps_to_original_outcome: |
        Anders's complaint was two purple series in the Live chart. The diff
        routes Pixii through --violet and Laddning bil EV through --cyan
        (~90° hue separation in both themes), using existing theme.css
        tokens with no new hex literals — so the two series now render in
        visually distinct, theme-correct colours.
      missing_evidence: []
      next_task: null
      notes: |
        PM verification was logical, not live. Accepted because (1) the diff
        is 21 lines of two short-circuits plus a getComputedStyle helper,
        (2) --violet and --cyan have proven dark+light values in
        theme.css:53,55,123,125, (3) fallbacks degrade to the prior (buggy)
        state on token-read failure rather than crashing. Follow-ups T005
        and T006 remain queued and out of slice.

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: unknown
    task: null
    commands: []
