# FTW embedded MQTT broker (eclipse-mosquitto).
#
# Exposes a single plain-TCP listener on 1883 for devices on the LAN
# (notably the Pixii PowerShaper's MQTT uplink). FTW itself
# connects over the same port on localhost thanks to host networking.
#
# Anonymous access is enabled because (a) the broker is intended for a
# single-home deployment on a trusted LAN and (b) some devices (Pixii
# among them) don't expose a credential field in their MQTT config UI.
# If you need authentication, drop a password_file in this directory,
# flip allow_anonymous to false, and reference it from here.

listener 1883 0.0.0.0

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
